                const bases = { thumbs: 250, videos: 1500, design: 300 };
                const multipliers = { basic: 1, semi: 1.25, dynamic: 1.5 };
                return bases[service] * multipliers[style];
            };

            const calculateTierPrice = (items) => {
                return (items.reels * getPrice('reels', editingStyle)) +
                       (items.thumbs * getPrice('thumbs', editingStyle)) +
                       (items.videos * getPrice('videos', editingStyle)) +
                       (items.design * getPrice('design', editingStyle));
            };

            const calcTotal = () => {
                let total = 0;
                if(activeServices.reels) total += config.reels * getPrice('reels', editingStyle);
                if(activeServices.thumbs) total += config.thumbs * getPrice('thumbs', editingStyle);
                if(activeServices.videos) total += config.videos * getPrice('videos', editingStyle);
                if(activeServices.design) total += config.design * getPrice('design', editingStyle);
                return total;
            };

            const toggleService = (service) => {
                setActiveServices(prev => ({...prev, [service]: !prev[service]}));
            };

            const handleWhatsApp = (tierName = null) => {
                const styleName = editingStyle === 'basic' ? t.packages.styleBasic : (editingStyle === 'semi' ? t.packages.styleSemi : t.packages.styleDyn);
                const pkgTitle = data[selectedPkg].title;
                let text = "";

                if (typeof tierName === 'string') {
                    const tierObj = data[selectedPkg].tiers.find(t => t.name === tierName);
                    const total = calculateTierPrice(tierObj.items).toLocaleString('es-MX');
                    text = `${t.packages.whatsappMsg} "${pkgTitle}" (Nivel: ${tierName}). Estilo de edición: ${styleName}. Total estimado: $${total} ${t.packages.currency}. ¿Podemos agendar?`;
                } else {
                    const total = calcTotal().toLocaleString('es-MX');
                    text = `${t.packages.whatsappMsg} "${pkgTitle}" (A la medida). Estilo de edición: ${styleName}. ${t.packages.estimated}: $${total} ${t.packages.currency}. Mis servicios activos son: ${activeServices.reels ? config.reels+' Reels, ' : ''}${activeServices.thumbs ? config.thumbs+' Miniaturas, ' : ''}${activeServices.videos ? config.videos+' Videos, ' : ''}${activeServices.design ? config.design+' Diseños' : ''}. ¿Podemos agendar?`;
                }
                
                window.open(`https://wa.me/5211234567890?text=${encodeURIComponent(text)}`, '_blank');
            };

            return (
                <section id="packages" className="py-16 md:py-32 bg-[#050505]">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6">
                        <div className="text-center mb-12 md:mb-20">
                            <h2 className="text-3xl sm:text-4xl md:text-6xl font-black text-white mb-2 md:mb-4">{t.packages.title1} <span className="text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-blue-500">{t.packages.title2}</span></h2>
                            <p className="text-sm md:text-base text-gray-400">{t.packages.desc}</p>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8">
                            {Object.entries(data).map(([k, p]) => (
                                <div key={k} onClick={() => handleCardClick(k)} className="group cursor-pointer relative bg-white/5 rounded-3xl border border-white/10 hover:border-white/30 transition-all hover:-translate-y-1 md:hover:-translate-y-2 overflow-hidden">
                                    <div className={`absolute top-0 w-full h-1 ${p.color}`}></div>
                                    <div className="p-6 md:p-8 flex flex-col items-center text-center h-full">
                                        <div className={`w-12 h-12 md:w-16 md:h-16 rounded-2xl flex items-center justify-center mb-4 md:mb-6 shadow-lg ${p.color}`}>{p.icon}</div>
                                        <h3 className="text-xl md:text-2xl font-bold text-white mb-2">{p.title}</h3>
                                        <p className="text-gray-400 mb-6 md:mb-8 text-xs md:text-sm">{p.desc}</p>
                                        <button className="mt-auto w-full md:w-auto px-6 py-2 rounded-full bg-white/10 text-white text-xs md:text-sm font-bold group-hover:bg-white group-hover:text-black transition-all">{t.packages.btnViewTiers}</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* MODAL */}
                    {selectedPkg && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-2 sm:p-4">
                            <div className="absolute inset-0 bg-black/80 backdrop-blur-md" onClick={() => setSelectedPkg(null)}></div>
                            <div className="bg-[#111] rounded-2xl md:rounded-3xl w-full max-w-5xl max-h-[95vh] overflow-y-auto relative z-10 border border-white/10 flex flex-col shadow-2xl">
                                
                                <div className={`p-5 md:p-8 ${data[selectedPkg].color} relative overflow-hidden flex-shrink-0`}>
                                    <button onClick={() => setSelectedPkg(null)} className="absolute top-4 right-4 md:top-6 md:right-6 p-2 bg-black/20 hover:bg-black/40 rounded-full text-white z-50 cursor-pointer hover:scale-110 transition-all"><X className="w-4 h-4 md:w-6 md:h-6" /></button>
                                    <div className="relative z-10 flex flex-col sm:flex-row items-center sm:items-start gap-4 md:gap-6 text-center sm:text-left">
                                        <div className="p-3 md:p-4 bg-white/20 backdrop-blur-md rounded-xl md:rounded-2xl">{data[selectedPkg].icon}</div>
                                        <div className="w-full">
                                            <h3 className="text-2xl md:text-3xl font-bold text-white mb-1 md:mb-0">{data[selectedPkg].title}</h3>
                                            
                                            <div className="flex flex-col sm:flex-row mt-3 md:mt-4 bg-black/30 p-1 rounded-xl w-full sm:w-fit mx-auto sm:mx-0">
                                                <button onClick={() => setMode('tiers')} className={`px-4 py-2 rounded-lg text-xs md:text-sm font-bold flex justify-center items-center gap-2 ${mode === 'tiers' ? 'bg-white text-black' : 'text-white/70 hover:text-white'}`}><Package className="w-3 h-3 md:w-4 md:h-4" /> {t.packages.tabTiers}</button>
                                                <button onClick={() => setMode('custom')} className={`px-4 py-2 rounded-lg text-xs md:text-sm font-bold flex justify-center items-center gap-2 ${mode === 'custom' ? 'bg-white text-black' : 'text-white/70 hover:text-white'}`}><Sliders className="w-3 h-3 md:w-4 md:h-4" /> {t.packages.tabCustom}</button>
                                            </div>

                                            {/* Selector de Estilo de Edición */}
                                            <div className="mt-4 md:mt-5 pt-4 md:pt-5 border-t border-white/10 w-full">
                                                <label className="text-[10px] md:text-xs font-bold text-white/60 uppercase tracking-widest mb-2 block text-center sm:text-left">{t.packages.styleLabel}</label>
                                                <div className="flex flex-wrap justify-center sm:justify-start gap-2">
                                                    <button onClick={() => setEditingStyle('basic')} className={`px-3 md:px-4 py-1.5 md:py-2 rounded-lg text-[10px] md:text-xs font-bold transition-all ${editingStyle === 'basic' ? 'bg-white text-black shadow-lg' : 'bg-black/30 text-white/70 hover:bg-white/10 hover:text-white'}`}>{t.packages.styleBasic}</button>
                                                    <button onClick={() => setEditingStyle('semi')} className={`px-3 md:px-4 py-1.5 md:py-2 rounded-lg text-[10px] md:text-xs font-bold transition-all ${editingStyle === 'semi' ? 'bg-white text-black shadow-lg' : 'bg-black/30 text-white/70 hover:bg-white/10 hover:text-white'}`}>{t.packages.styleSemi}</button>
                                                    <button onClick={() => setEditingStyle('dynamic')} className={`px-3 md:px-4 py-1.5 md:py-2 rounded-lg text-[10px] md:text-xs font-bold transition-all ${editingStyle === 'dynamic' ? 'bg-white text-black shadow-lg' : 'bg-black/30 text-white/70 hover:bg-white/10 hover:text-white'}`}>{t.packages.styleDyn}</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="p-5 md:p-8 bg-[#111] flex-grow">
                                    {mode === 'tiers' ? (
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6">
                                            {data[selectedPkg].tiers.map((tier, i) => (
                                                <div key={i} className="bg-white/5 p-5 md:p-6 rounded-xl md:rounded-2xl border border-white/5 hover:border-white/20 transition-all flex flex-col">
                                                    <span className={`text-[10px] md:text-xs font-bold uppercase tracking-widest ${data[selectedPkg].accent}`}>Nivel {i+1}</span>
                                                    <h4 className="text-xl md:text-2xl font-bold text-white mt-1 md:mt-2">{tier.name}</h4>
                                                    <div className="text-xl md:text-3xl font-bold text-white mt-1 md:mt-2 mb-4 md:mb-6">
                                                        ${calculateTierPrice(tier.items).toLocaleString('es-MX')} <span className="text-sm text-gray-400 font-normal">{t.packages.currency}</span>
                                                    </div>
                                                    <ul className="space-y-2 md:space-y-3 mb-6 md:mb-8 flex-grow">
                                                        {tier.feats.map((f, j) => (
                                                            <li key={j} className="flex gap-2 text-xs md:text-sm text-gray-400"><Check className={`w-3 h-3 md:w-4 md:h-4 flex-shrink-0 ${data[selectedPkg].accent}`} /> <span>{f}</span></li>
                                                        ))}
                                                    </ul>
                                                    <button onClick={() => handleWhatsApp(tier.name)} className={`w-full py-3 rounded-xl font-bold text-white text-sm md:text-base ${data[selectedPkg].color} hover:opacity-90 transition-opacity`}>Elegir {tier.name}</button>
                                                </div>
                                            ))}
                                            <div className="col-span-1 md:col-span-3 text-center mt-2 md:mt-4">
                                                <p className="text-[10px] md:text-xs text-gray-500 uppercase tracking-widest">{t.packages.paymentNote}</p>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 md:gap-12">
                                            <div className="space-y-6 md:space-y-8">
                                                <div>
                                                    <h4 className="text-lg md:text-xl font-bold text-white mb-3 md:mb-4">{t.packages.step1}</h4>
                                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                                        {[
                                                            { id: 'reels', icon: <Smartphone className="w-4 h-4 md:w-5 md:h-5"/>, label: t.packages.customLabels.reels },
                                                            { id: 'thumbs', icon: <ImageIcon className="w-4 h-4 md:w-5 md:h-5"/>, label: t.packages.customLabels.thumbs },
                                                            { id: 'videos', icon: <Video className="w-4 h-4 md:w-5 md:h-5"/>, label: t.packages.customLabels.videos },
                                                            { id: 'design', icon: <Palette className="w-4 h-4 md:w-5 md:h-5"/>, label: t.packages.customLabels.design }
                                                        ].map((s) => (
                                                            <button key={s.id} onClick={() => toggleService(s.id)} 
                                                                className={`p-3 rounded-xl border flex items-center gap-3 transition-all ${activeServices[s.id] ? `border-white bg-white text-black` : 'border-white/10 bg-white/5 text-gray-400 hover:bg-white/10'}`}>
                                                                {s.icon} <span className="font-bold text-xs md:text-sm">{s.label}</span>
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                                
                                                <div className="space-y-4 md:space-y-6">
                                                    <h4 className="text-lg md:text-xl font-bold text-white">{t.packages.step2}</h4>
                                                    {!Object.values(activeServices).some(Boolean) && <div className="text-gray-500 text-xs md:text-sm border border-dashed border-gray-700 p-4 rounded-xl text-center">{t.packages.selectService}</div>}
                                                    
                                                    {activeServices.reels && <div><div className="flex justify-between text-white text-xs md:text-sm font-bold mb-2"><span>{t.packages.customLabels.reels}</span><span>{config.reels}</span></div><input type="range" min="1" max="30" value={config.reels} onChange={e=>setConfig({...config, reels: parseInt(e.target.value)})} className="w-full accent-white" /></div>}
                                                    {activeServices.thumbs && <div><div className="flex justify-between text-white text-xs md:text-sm font-bold mb-2"><span>{t.packages.customLabels.thumbs}</span><span>{config.thumbs}</span></div><input type="range" min="1" max="20" value={config.thumbs} onChange={e=>setConfig({...config, thumbs: parseInt(e.target.value)})} className="w-full accent-white" /></div>}
                                                    {activeServices.videos && <div><div className="flex justify-between text-white text-xs md:text-sm font-bold mb-2"><span>{t.packages.customLabels.videos}</span><span>{config.videos}</span></div><input type="range" min="1" max="10" value={config.videos} onChange={e=>setConfig({...config, videos: parseInt(e.target.value)})} className="w-full accent-white" /></div>}
                                                    {activeServices.design && <div><div className="flex justify-between text-white text-xs md:text-sm font-bold mb-2"><span>{t.packages.customLabels.design}</span><span>{config.design}</span></div><input type="range" min="1" max="20" value={config.design} onChange={e=>setConfig({...config, design: parseInt(e.target.value)})} className="w-full accent-white" /></div>}
                                                </div>
                                            </div>

                                            <div className="bg-[#050505] rounded-xl md:rounded-2xl p-5 md:p-8 border border-white/10 flex flex-col justify-between">
                                                <div>
                                                    <h4 className="text-gray-400 uppercase tracking-widest text-[10px] md:text-sm font-bold mb-4 md:mb-6">{t.packages.summary}</h4>
                                                    <ul className="space-y-3 md:space-y-4 text-xs md:text-sm text-gray-300">
                                                        {activeServices.reels && <li className="flex justify-between"><span>{config.reels} x {t.packages.customLabels.reels}</span><span>${(config.reels * getPrice('reels', editingStyle)).toLocaleString('es-MX')}</span></li>}
                                                        {activeServices.thumbs && <li className="flex justify-between"><span>{config.thumbs} x {t.packages.customLabels.thumbs}</span><span>${(config.thumbs * getPrice('thumbs', editingStyle)).toLocaleString('es-MX')}</span></li>}
                                                        {activeServices.videos && <li className="flex justify-between"><span>{config.videos} x {t.packages.customLabels.videos}</span><span>${(config.videos * getPrice('videos', editingStyle)).toLocaleString('es-MX')}</span></li>}
                                                        {activeServices.design && <li className="flex justify-between"><span>{config.design} x {t.packages.customLabels.design}</span><span>${(config.design * getPrice('design', editingStyle)).toLocaleString('es-MX')}</span></li>}
                                                    </ul>
                                                </div>
                                                <div className="mt-6 md:mt-8 pt-4 md:pt-6 border-t border-white/10">
                                                    <div className="flex justify-between items-end mb-4 md:mb-6">
                                                        <span className="text-gray-400 text-xs md:text-sm">{t.packages.estimated}</span>
                                                        <span className="text-2xl md:text-4xl font-bold text-white">${calcTotal().toLocaleString('es-MX')} {t.packages.currency}</span>
                                                    </div>
                                                    <button onClick={handleWhatsApp} className="w-full bg-[#25D366] text-white py-3 md:py-4 rounded-xl font-bold hover:bg-[#1ebd5a] transition-colors flex items-center justify-center gap-2 text-sm md:text-base shadow-lg shadow-[#25D366]/20">
                                                        <MessageCircle className="w-4 h-4 md:w-5 md:h-5" /> {t.packages.btnConfirm}
                                                    </button>
                                                    <p className="text-center text-[9px] md:text-xs text-gray-500 mt-3 md:mt-4 uppercase tracking-widest">{t.packages.paymentNote}</p>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </section>
            );
        };

        // --- TEAM SECTION ---
        const TeamSection = () => {
            const { t } = useContext(LanguageContext);
            return (
                <section className="py-16 md:py-32 bg-[#050505] border-t border-white/10 relative overflow-hidden">
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] h-[300px] md:w-[600px] md:h-[600px] bg-blue-900/10 rounded-full blur-[80px] md:blur-[120px]"></div>

                    <div className="max-w-7xl mx-auto px-4 sm:px-6 relative z-10">
                        <div className="text-center mb-12 md:mb-20">
                            <span className="text-blue-500 font-bold tracking-widest text-xs md:text-sm uppercase">{t.team.tag}</span>
                            <h2 className="text-3xl sm:text-4xl md:text-6xl font-black text-white mt-2">{t.team.title}</h2>
                        </div>

                        <div className="flex justify-center max-w-5xl mx-auto">
                            <div className="group relative w-full max-w-sm md:max-w-lg">
                                <div className="absolute -inset-1 bg-gradient-to-r from-blue-600 to-purple-600 rounded-2xl md:rounded-3xl blur opacity-20 group-hover:opacity-60 transition duration-500"></div>
                                <div className="relative bg-[#0a0a0a] border border-white/10 p-6 md:p-10 rounded-2xl md:rounded-3xl text-center transform group-hover:-translate-y-1 md:group-hover:-translate-y-2 transition duration-500 h-full flex flex-col items-center">
                                    <div className="w-32 h-32 md:w-48 md:h-48 mx-auto rounded-full p-1 bg-gradient-to-br from-blue-500 to-purple-600 mb-6 md:mb-8 shadow-xl shadow-blue-900/20">
                                        <img 
                                            src="https://media.discordapp.net/attachments/1020791454852984863/1464075922465493013/unnamed_1.jpg?ex=6991d035&is=69907eb5&hm=58109d2e9ce555d34d5641ea48e086e7ffed02c90768c2cd2978d03517f4a67e&=&format=webp&width=800&height=800" 
                                            alt="Andres David" 
                                            className="w-full h-full object-cover rounded-full border-2 md:border-4 border-[#0a0a0a]" 
                                        />
                                    </div>
                                    <h3 className="text-2xl md:text-3xl font-bold text-white mb-2">Andres David</h3>
                                    <div className="inline-flex items-center gap-1.5 md:gap-2 px-3 py-1 md:px-4 md:py-1.5 rounded-full bg-blue-500/10 text-blue-400 text-[10px] md:text-xs font-bold uppercase tracking-wider mb-4 md:mb-6 border border-blue-500/20">
                                        <Crown className="w-3 h-3" /> {t.team.role}
                                    </div>
                                    <p className="text-gray-400 text-sm md:text-base leading-relaxed mb-6 md:mb-8 flex-grow">
                                        {t.team.desc}
                                    </p>
                                    <div className="flex justify-center gap-3 md:gap-4 mt-auto">
                                        <a href="#" className="p-2 md:p-3 bg-white/5 rounded-xl hover:bg-blue-600 hover:text-white transition-all hover:scale-110 text-gray-400"><Linkedin className="w-4 h-4 md:w-5 md:h-5"/></a>
                                        <a href="#" className="p-2 md:p-3 bg-white/5 rounded-xl hover:bg-blue-600 hover:text-white transition-all hover:scale-110 text-gray-400"><Mail className="w-4 h-4 md:w-5 md:h-5"/></a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // --- FOOTER ---
        const Footer = () => {
            const { t } = useContext(LanguageContext);
            return (
                <footer className="bg-black text-white pt-16 md:pt-20 pb-8 md:pb-10 border-t border-white/10">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 text-center md:text-left">
                        <div className="grid md:grid-cols-4 gap-8 md:gap-12 mb-12 md:mb-16">
                            <div className="col-span-1 md:col-span-2">
                                <span className="text-2xl font-bold">{t.nav.logo}<span className="text-blue-600">{t.nav.logoAccent}</span></span>
                                <p className="text-gray-500 mt-4 max-w-sm mx-auto md:mx-0 text-sm md:text-base">{t.footer.desc}</p>
                            </div>
                            <div>
                                <h4 className="font-bold mb-4">{t.footer.srvTitle}</h4>
                                <ul className="space-y-2 text-gray-500 text-sm">
                                    <li><a href="#" className="hover:text-white">{t.footer.srv1}</a></li>
                                    <li><a href="#" className="hover:text-white">{t.footer.srv2}</a></li>
                                    <li><a href="#" className="hover:text-white">{t.footer.srv3}</a></li>
                                </ul>
                            </div>
                            <div>
                                <h4 className="font-bold mb-4">{t.footer.legalTitle}</h4>
                                <ul className="space-y-2 text-gray-500 text-sm">
                                    <li><a href="#" className="hover:text-white">{t.footer.leg1}</a></li>
                                    <li><a href="#" className="hover:text-white">{t.footer.leg2}</a></li>
                                </ul>
                            </div>
                        </div>
                        <div className="border-t border-white/10 pt-6 md:pt-8 text-center text-gray-600 text-xs md:text-sm">
                            &copy; 2026 NovaDigital. {t.footer.rights}
                        </div>
                    </div>
                </footer>
            );
        };

        // --- APP MAIN ---
        const App = () => {
            const [lang, setLang] = useState('es');
            const t = translations[lang];

            return (
                <LanguageContext.Provider value={{ lang, setLang, t }}>
                    <div className="min-h-screen font-sans selection:bg-blue-500 selection:text-white">
                        <Navigation />
                        <main>
                            <HeroSection />
                            <PhilosophySection />
                            <ServicesSection />
                            <ProductionCapabilities />
                            <VideoShowcase />
                            <PackagesSection />
                            <TeamSection />
                        </main>
                        <Footer />
                    </div>
                </LanguageContext.Provider>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
