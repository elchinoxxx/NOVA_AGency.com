                                        <div className="grid grid-cols-3 gap-1.5 md:gap-2 w-full md:w-3/5">
                                            <button onClick={() => setEditingStyle('basic')} className={`flex flex-col items-center justify-start px-2 py-2 rounded-md transition-all h-full ${editingStyle === 'basic' ? 'bg-white text-black shadow-lg' : 'bg-black/30 text-white/70 hover:bg-white/10 hover:text-white'}`}>
                                                <span className="text-[10px] md:text-xs font-bold mb-1">{t.packages.styleBasic}</span>
                                                <span className="text-[8px] md:text-[9px] font-normal opacity-80 text-center leading-tight">{t.packages.styleBasicDesc}</span>
                                            </button>
                                            <button onClick={() => setEditingStyle('semi')} className={`flex flex-col items-center justify-start px-2 py-2 rounded-md transition-all h-full ${editingStyle === 'semi' ? 'bg-white text-black shadow-lg' : 'bg-black/30 text-white/70 hover:bg-white/10 hover:text-white'}`}>
                                                <span className="text-[10px] md:text-xs font-bold mb-1">{t.packages.styleSemi}</span>
                                                <span className="text-[8px] md:text-[9px] font-normal opacity-80 text-center leading-tight">{t.packages.styleSemiDesc}</span>
                                            </button>
                                            <button onClick={() => setEditingStyle('dynamic')} className={`flex flex-col items-center justify-start px-2 py-2 rounded-md transition-all h-full ${editingStyle === 'dynamic' ? 'bg-white text-black shadow-lg' : 'bg-black/30 text-white/70 hover:bg-white/10 hover:text-white'}`}>
                                                <span className="text-[10px] md:text-xs font-bold mb-1">{t.packages.styleDyn}</span>
                                                <span className="text-[8px] md:text-[9px] font-normal opacity-80 text-center leading-tight">{t.packages.styleDynDesc}</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                {/* Cuerpo Desplazable (Scroll) */}
                                <div className="p-4 md:p-6 bg-[#111] overflow-y-auto custom-scrollbar flex-grow">
                                    {mode === 'tiers' ? (
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6">
                                            {data[selectedPkg].tiers.map((tier, i) => (
                                                <div key={i} className="bg-white/5 p-5 md:p-6 rounded-xl md:rounded-2xl border border-white/5 hover:border-white/20 transition-all flex flex-col">
                                                    <span className={`text-[10px] md:text-xs font-bold uppercase tracking-widest ${data[selectedPkg].accent}`}>Nivel {i+1}</span>
                                                    <h4 className="text-xl md:text-2xl font-bold text-white mt-1 md:mt-2">{tier.name}</h4>
                                                    <div className="text-xl md:text-3xl font-bold text-white mt-1 md:mt-2 mb-4 md:mb-6">
                                                        ${calculateTierPrice(tier.items, data[selectedPkg].base).toLocaleString('es-MX')} <span className="text-sm text-gray-400 font-normal">{t.packages.currency}</span>
                                                    </div>
                                                    <ul className="space-y-2 md:space-y-3 mb-6 md:mb-8 flex-grow">
                                                        {tier.feats.map((f, j) => (
                                                            <li key={j} className="flex gap-2 text-xs md:text-sm text-gray-400"><Check className={`w-3 h-3 md:w-4 md:h-4 flex-shrink-0 ${data[selectedPkg].accent}`} /> <span>{f}</span></li>
                                                        ))}
                                                    </ul>
                                                    <button onClick={() => {
                                                        if (tier.stripeLink) {
                                                            window.open(tier.stripeLink, '_blank');
                                                        } else {
                                                            alert(lang === 'en' ? "Payment link pending configuration." : "Enlace de pago pendiente de configuración.");
                                                        }
                                                    }} className={`w-full py-3 rounded-xl font-bold text-white text-sm md:text-base ${data[selectedPkg].color} hover:opacity-90 transition-opacity mt-auto`}>
                                                        {lang === 'en' ? 'Pay' : 'Pagar'} {tier.name}
                                                    </button>
                                                </div>
                                            ))}
                                            <div className="col-span-1 md:col-span-3 text-center mt-2 md:mt-4">
                                                <p className="text-[10px] md:text-xs text-gray-500 uppercase tracking-widest">{t.packages.paymentNote}</p>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-12">
                                            <div className="space-y-6 md:space-y-8">
                                                <div>
                                                    <h4 className="text-lg md:text-xl font-bold text-white mb-3 md:mb-4">{t.packages.step1}</h4>
                                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                                        {customServiceControls.map((s) => (
                                                            <button key={s.id} onClick={() => toggleService(s.id)} 
                                                                className={`p-3 rounded-xl border flex items-center gap-3 transition-all ${activeServices[s.id] ? `border-white bg-white text-black` : 'border-white/10 bg-white/5 text-gray-400 hover:bg-white/10'}`}>
                                                                {s.icon} <span className="font-bold text-xs md:text-sm">{s.label}</span>
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                                
                                                <div className="space-y-4 md:space-y-6">
                                                    <h4 className="text-lg md:text-xl font-bold text-white">{t.packages.step2}</h4>
                                                    {!Object.values(activeServices).some(Boolean) && <div className="text-gray-500 text-xs md:text-sm border border-dashed border-gray-700 p-4 rounded-xl text-center">{t.packages.selectService}</div>}
                                                    
                                                    {customServiceControls.map((s) => activeServices[s.id] && (
                                                        <div key={`slider-${s.id}`}>
                                                            <div className="flex justify-between text-white text-xs md:text-sm font-bold mb-2">
                                                                <span>{s.label}</span><span>{config[s.id]}</span>
                                                            </div>
                                                            <input type="range" min="1" max={s.max} value={config[s.id]} onChange={e => setConfig({...config, [s.id]: parseInt(e.target.value)})} className="w-full accent-white" />
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            <div className="bg-[#050505] rounded-xl md:rounded-2xl p-5 md:p-8 border border-white/10 flex flex-col justify-between h-full">
                                                <div>
                                                    <h4 className="text-gray-400 uppercase tracking-widest text-[10px] md:text-sm font-bold mb-4 md:mb-6">{t.packages.summary}</h4>
                                                    <ul className="space-y-3 md:space-y-4 text-xs md:text-sm text-gray-300">
                                                        {customServiceControls.map((s) => activeServices[s.id] && (
                                                            <li key={`sum-${s.id}`} className="flex justify-between">
                                                                <span>{config[s.id]} x {s.label}</span>
                                                                <span>${(config[s.id] * getPrice(s.id, editingStyle)).toLocaleString('es-MX')}</span>
                                                            </li>
                                                        ))}
                                                        {data[selectedPkg].base > 0 && (
                                                            <li className="flex justify-between pt-3 md:pt-4 border-t border-white/10 text-[10px] md:text-xs text-gray-500 uppercase">
                                                                <span>{t.packages.baseFee}</span>
                                                                <span>${getBaseFee(data[selectedPkg].base, editingStyle).toLocaleString('es-MX')}</span>
                                                            </li>
                                                        )}
                                                    </ul>
                                                </div>
                                                <div className="mt-6 md:mt-8 pt-4 md:pt-6 border-t border-white/10">
                                                    <div className="flex justify-between items-end mb-4 md:mb-6">
                                                        <span className="text-gray-400 text-xs md:text-sm">{t.packages.estimated}</span>
                                                        <span className="text-2xl md:text-4xl font-bold text-white">${calcTotal().toLocaleString('es-MX')}</span>
                                                    </div>
                                                    <button onClick={() => handleWhatsApp(null)} className="w-full bg-[#25D366] text-white py-3 md:py-4 rounded-xl font-bold hover:bg-[#1ebd5a] transition-colors flex items-center justify-center gap-2 text-sm md:text-base shadow-lg shadow-[#25D366]/20">
                                                        <MessageCircle className="w-4 h-4 md:w-5 md:h-5" /> {t.packages.btnConfirm}
                                                    </button>
                                                    <p className="text-center text-[9px] md:text-xs text-gray-500 mt-3 md:mt-4 uppercase tracking-widest">{t.packages.paymentNote}</p>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </section>
            );
        };

        // --- TEAM SECTION ---
        const TeamSection = () => {
            const { t } = useContext(LanguageContext);
            return (
                <section id="liderazgo" className="py-16 md:py-32 bg-[#050505] border-t border-white/10 relative overflow-hidden">
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] h-[300px] md:w-[600px] md:h-[600px] bg-blue-900/10 rounded-full blur-[80px] md:blur-[120px]"></div>

                    <div className="max-w-7xl mx-auto px-4 sm:px-6 relative z-10">
                        <div className="text-center mb-12 md:mb-20">
                            <span className="text-blue-500 font-bold tracking-widest text-xs md:text-sm uppercase">{t.team.tag}</span>
                            <h2 className="text-3xl sm:text-4xl md:text-6xl font-black text-white mt-2">{t.team.title}</h2>
                        </div>

                        <div className="flex justify-center max-w-5xl mx-auto">
                            <div className="group relative w-full max-w-sm md:max-w-lg">
                                <div className="absolute -inset-1 bg-gradient-to-r from-blue-600 to-purple-600 rounded-2xl md:rounded-3xl blur opacity-20 group-hover:opacity-60 transition duration-500"></div>
                                <div className="relative bg-[#0a0a0a] border border-white/10 p-6 md:p-10 rounded-2xl md:rounded-3xl text-center transform group-hover:-translate-y-1 md:group-hover:-translate-y-2 transition duration-500 h-full flex flex-col items-center">
                                    <div className="w-32 h-32 md:w-48 md:h-48 mx-auto rounded-full p-1 bg-gradient-to-br from-blue-500 to-purple-600 mb-6 md:mb-8 shadow-xl shadow-blue-900/20">
                                        <img 
                                            src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=800&q=80" 
                                            alt="Andres David" 
                                            className="w-full h-full object-cover rounded-full border-2 md:border-4 border-[#0a0a0a]" 
                                        />
                                    </div>
                                    <h3 className="text-2xl md:text-3xl font-bold text-white mb-2">Andres Garcia Huerta</h3>
                                    <div className="inline-flex items-center gap-1.5 md:gap-2 px-3 py-1 md:px-4 md:py-1.5 rounded-full bg-blue-500/10 text-blue-400 text-[10px] md:text-xs font-bold uppercase tracking-wider mb-4 md:mb-6 border border-blue-500/20">
                                        <Crown className="w-3 h-3" /> {t.team.role}
                                    </div>
                                    <p className="text-gray-400 text-sm md:text-base leading-relaxed mb-6 md:mb-8 flex-grow">
                                        {t.team.desc}
                                    </p>
                                    <div className="flex justify-center gap-3 md:gap-4 mt-auto">
                                        <a href="mailto:elokinyat@gmail.com" className="p-2 md:p-3 bg-white/5 rounded-xl hover:bg-blue-600 hover:text-white transition-all hover:scale-110 text-gray-400"><Mail className="w-4 h-4 md:w-5 md:h-5"/></a>
                                        <a href="#" className="p-2 md:p-3 bg-white/5 rounded-xl hover:bg-blue-600 hover:text-white transition-all hover:scale-110 text-gray-400"><Linkedin className="w-4 h-4 md:w-5 md:h-5"/></a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // --- FOOTER ---
        const Footer = () => {
            const { t } = useContext(LanguageContext);
            return (
                <footer className="bg-black text-white pt-16 md:pt-20 pb-24 md:pb-10 border-t border-white/10">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 text-center md:text-left">
                        <div className="grid md:grid-cols-4 gap-8 md:gap-12 mb-12 md:mb-16">
                            <div className="col-span-1 md:col-span-2">
                                <span className="text-2xl font-bold">{t.nav.logo}<span className="text-blue-600">{t.nav.logoAccent}</span></span>
                                <p className="text-gray-500 mt-4 max-w-sm mx-auto md:mx-0 text-sm md:text-base">{t.footer.desc}</p>
                            </div>
                            <div>
                                <h4 className="font-bold mb-4">{t.footer.srvTitle}</h4>
                                <ul className="space-y-2 text-gray-500 text-sm">
                                    <li><a href="#servicios" className="hover:text-white">{t.footer.srv1}</a></li>
                                    <li><a href="#showcase" className="hover:text-white">{t.footer.srv2}</a></li>
                                    <li><a href="#paquetes" className="hover:text-white">{t.footer.srv3}</a></li>
                                </ul>
                            </div>
                            <div>
                                <h4 className="font-bold mb-4">{t.footer.legalTitle}</h4>
                                <ul className="space-y-2 text-gray-500 text-sm">
                                    <li><a href="#" className="hover:text-white">{t.footer.leg1}</a></li>
                                    <li><a href="#" className="hover:text-white">{t.footer.leg2}</a></li>
                                </ul>
                            </div>
                        </div>
                        <div className="border-t border-white/10 pt-6 md:pt-8 text-center text-gray-600 text-xs md:text-sm">
                            &copy; 2026 AD. {t.footer.rights}
                        </div>
                    </div>
                </footer>
            );
        };

        // --- APP MAIN ---
        const App = () => {
            const [lang, setLang] = useState('es');
            const t = translations[lang];

            return (
                <LanguageContext.Provider value={{ lang, setLang, t }}>
                    <div className="min-h-screen font-sans selection:bg-blue-500 selection:text-white pb-16 md:pb-0">
                        <Navigation />
                        <main>
                            <HeroSection />
                            <PhilosophySection />
                            <ServicesSection />
                            <ProductionCapabilities />
                            <VideoShowcase />
                            <PackagesSection />
                            <TeamSection />
                        </main>
                        <Footer />
                    </div>
                </LanguageContext.Provider>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
